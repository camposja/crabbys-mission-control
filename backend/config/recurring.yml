development:
  poll_openclaw_events:
    class: OpenclawEventPollerJob
    queue: default
    schedule: every 5 seconds

  agent_status_sync:
    class: AgentStatusSyncJob
    queue: default
    schedule: every 30 seconds

  system_metrics:
    class: SystemMetricsJob
    queue: default
    schedule: every 30 seconds

  heartbeat_check:
    class: HeartbeatCheckJob
    queue: default
    schedule: every 5 minutes

  calendar_sync:
    class: CalendarSyncJob
    queue: default
    schedule: every 5 minutes

  cron_sync:
    class: CronSyncJob
    queue: default
    schedule: every 5 minutes

  usage_spike_checker:
    class: UsageSpikeCheckerJob
    queue: default
    schedule: every 15 minutes

production:
  poll_openclaw_events:
    class: OpenclawEventPollerJob
    queue: default
    schedule: every 5 seconds

  agent_status_sync:
    class: AgentStatusSyncJob
    queue: default
    schedule: every 30 seconds

  system_metrics:
    class: SystemMetricsJob
    queue: default
    schedule: every 30 seconds

  calendar_sync:
    class: CalendarSyncJob
    queue: default
    schedule: every 5 minutes

  cron_sync:
    class: CronSyncJob
    queue: default
    schedule: every 5 minutes

  usage_spike_checker:
    class: UsageSpikeCheckerJob
    queue: default
    schedule: every 15 minutes

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
