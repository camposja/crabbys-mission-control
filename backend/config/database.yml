default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432

development:
  <<: *default
  database: crabbys_mission_control_development

test:
  <<: *default
  database: crabbys_mission_control_test

production:
  primary: &primary_production
    <<: *default
    database: crabbys_mission_control_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: crabbys_mission_control_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: crabbys_mission_control_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: crabbys_mission_control_production_cable
    migrations_paths: db/cable_migrate
